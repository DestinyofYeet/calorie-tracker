---
enable-email-notifications: true
name: "Check"
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  flake_check:
    runs-on: native
    if: '! github.event.pull_request.draft'
    steps:
      - name: Fetch source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check package
        run: |
          nix flake check
      - name: Generate format diff
        if: failure()
        run: |
          nix fmt
          git diff --exit-code > patch.diff
      - name: Upload format path diff
        if: failure()
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: format-patch-diff
          path: path.diff
          show-progress: true
          overwrite: true

  check_commit_format:
    runs-on: native
    if: '! github.event.pull_request.draft'
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          git checkout "${{ github.head_ref }}"
          git pull
      - name: Check commit format
        run: |
          nix run nixpkgs#commitizen -- check -d
